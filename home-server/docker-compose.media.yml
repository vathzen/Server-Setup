services:

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Helsinki
    volumes:
      - ./containers/sonarr/config:/config
      - /mnt/cornucopia:/data
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks: [internal]

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Helsinki
    volumes:
      - ./containers/radarr/config:/config
      - /mnt/cornucopia:/data
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks: [internal]

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Helsinki
    volumes:
      - ./containers/prowlarr/config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks: [internal]

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Helsinki
      - WEBUI_PORT=8082
    volumes:
      - ./containers/qbittorrent/config:/config
      - /mnt/cornucopia:/data
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_started
    restart: unless-stopped
    # Commenting cuz Gluetun
    # ports:
    #   - "8082:8082"
    #   - "6881:6881"
    #   - "6881:6881/udp"
    # networks: [internal]

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Helsinki
      - JELLYFIN_PublishedServerUrl=https://tv.vathzen.in
    volumes:
      - ./containers/jellyfin/config:/config
      - /mnt/cornucopia/media:/data/media:ro
    ports:
      - "8096:8096"
      - "7359:7359/udp"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "992"
    restart: unless-stopped
    networks: [internal]

networks:
  internal:
    external: true
    name: olympus_internal