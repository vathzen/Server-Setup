services:
  cloudflare-ddns-home:
    image: oznu/cloudflare-ddns:latest
    container_name: cloudflare-ddns-home
    environment:
      - API_KEY=${CLOUDFLARE_API_KEY}
      - ZONE=${ZONE}
      - SUBDOMAIN=${SUBDOMAIN}
      - PROXIED=false
    restart: unless-stopped
 
  caddy:
    image: caddybuilds/caddy-cloudflare:latest
    container_name: caddy
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_KEY}
      - TAILNET_IP=${TAILNET_IP}    
    volumes:
      - ./containers/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./containers/caddy/caddy_data:/data
      - ./containers/caddy/caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks: [internal]
  
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    environment:
      TZ: 'Europe/Helsinki'
      FTLCONF_webserver_api_password: ${PIHOLE_API_PASSWORD}
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - ./containers/pihole:/etc/pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8075:80/tcp"
      - "4431:443/tcp"
    restart: unless-stopped
    networks: [internal]

  samba:
    image: crazymax/samba:latest
    container_name: samba
    environment:
      - TZ=Europe/Helsinki
      - SAMBA_LOG_LEVEL=1
      - SAMBA_PASSWORD=${SAMBA_PASSWORD}
    ports:
      - "139:139"
      - "445:445"
    volumes:
      - ./containers/samba/config:/data
      - /mnt/cornucopia:/mnt/cornucopia
      - /mnt/pandora:/mnt/pandora
    restart: unless-stopped
    networks: [internal]

  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESS}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRY}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - PORT_FORWARD_ONLY=on
      - TZ=Europe/Helsinki
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- --post-data "json=%7B%22listen_port%22%3A{{PORTS}}%7D" http://127.0.0.1:8082/api/v2/app/setPreferences 2>&1'
      # - FIREWALL_OUTBOUND_SUBNETS=192.168.101.0/24
    volumes:
      - ./containers/gluetun:/gluetun
    ports:
      - "8082:8082" # qBittorrent
      - "8000:8000"
    restart: unless-stopped
    networks: [internal]

networks:
  internal:
    external: true
    name: olympus_internal
